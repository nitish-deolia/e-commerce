name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    - name: Build and test services
      run: |
        cd auth-service && mvn -B clean test
        cd ../product-service && mvn -B clean test
        cd ../order-service && mvn -B clean test
        cd ../inventory-service && mvn -B clean test
