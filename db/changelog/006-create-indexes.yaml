databaseChangeLog:
  - changeSet:
      id: 006-create-indexes
      author: system
      comment: Create database indexes for performance
      changes:
        - createIndex:
            indexName: idx_users_email
            tableName: users
            schemaName: ecommerce
            columns:
              - column:
                  name: email
        - createIndex:
            indexName: idx_users_username
            tableName: users
            schemaName: ecommerce
            columns:
              - column:
                  name: username
        - createIndex:
            indexName: idx_products_category
            tableName: products
            schemaName: ecommerce
            columns:
              - column:
                  name: category
        - createIndex:
            indexName: idx_products_is_active
            tableName: products
            schemaName: ecommerce
            columns:
              - column:
                  name: is_active
        - createIndex:
            indexName: idx_orders_user_id
            tableName: orders
            schemaName: ecommerce
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_orders_status
            tableName: orders
            schemaName: ecommerce
            columns:
              - column:
                  name: status
        - createIndex:
            indexName: idx_orders_order_date
            tableName: orders
            schemaName: ecommerce
            columns:
              - column:
                  name: order_date
        - createIndex:
            indexName: idx_order_items_order_id
            tableName: order_items
            schemaName: ecommerce
            columns:
              - column:
