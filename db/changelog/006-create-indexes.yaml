        - createIndex:
            indexName: idx_order_items_product_id
            tableName: order_items
            schemaName: ecommerce
            columns:
              - column:
                  name: product_id
        - createIndex:
            indexName: idx_inventory_product_id
            tableName: inventory
            schemaName: ecommerce
            columns:
              - column:
                  name: product_id
        - createIndex:
            indexName: idx_inventory_history_inventory_id
            tableName: inventory_history
            schemaName: ecommerce
            columns:
              - column:
                  name: inventory_id
        - createIndex:
            indexName: idx_inventory_history_timestamp
            tableName: inventory_history
            schemaName: ecommerce
            columns:
              - column:
                  name: timestamp
